<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Human Bingo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=M+PLUS+Rounded+1c:wght@400;700&display=swap');

        :root {
            --primary-red: #e84393;
            --primary-pink: #ff74a4;
            --soft-gold: #d4a373;
            --bg-gradient: linear-gradient(135deg, #fff5f5 0%, #fff0f0 100%);
            --text-color: #5d5d5d;
            --shadow: 0 8px 20px rgba(255, 116, 164, 0.1);
            --font-main: 'M PLUS Rounded 1c', sans-serif;
            --font-deco: 'Dancing Script', cursive;
        }

        body {
            font-family: var(--font-main);
            text-align: center;
            background: var(--bg-gradient);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: var(--font-deco);
            font-size: clamp(2.8rem, 12vw, 4rem);
            color: var(--primary-red);
            margin: 30px 0 5px;
            cursor: pointer;
            user-select: none;
            filter: drop-shadow(2px 2px 0px white);
        }

        .subtitle {
            font-size: 0.75rem;
            letter-spacing: 0.2rem;
            color: var(--primary-pink);
            margin-bottom: 20px;
            font-weight: 700;
        }

        /* Rules Section */
        .rules-container {
            max-width: 450px;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            margin-bottom: 25px;
            padding: 15px;
            box-shadow: var(--shadow);
            border: 2px dashed #ffb3c6;
            box-sizing: border-box;
        }
        .rules-title {
            font-size: 1rem;
            font-weight: bold;
            color: var(--primary-red);
            margin-bottom: 5px;
            display: block;
        }
        .rules-content {
            font-size: 0.8rem;
            line-height: 1.5;
            text-align: left;
            color: #777;
        }
        .rules-content ul { margin: 5px 0; padding-left: 20px; }

        /* Bingo Board */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 450px;
            width: 100%;
            perspective: 1000px;
        }

        .cell {
            background: white;
            border: 3px solid #ffecf2;
            border-radius: 25px;
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 700;
            box-shadow: var(--shadow);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            color: #888;
            line-height: 1.4;
            overflow: hidden;
        }

        .cell.active {
            background: #fffafa;
            border-color: var(--primary-pink);
            color: #555;
            transform: scale(1.03);
        }

        .cell.resetting { transform: scale(0) rotate(30deg); opacity: 0; }

        .cell#free-cell {
            background: linear-gradient(135deg, #ff74a4 0%, #ffb3c6 100%);
            color: white;
            border: none;
            cursor: default;
        }
        .cell#free-cell::before { content: "💖"; font-size: 1.4rem; margin-bottom: 2px; }

        .name-display {
            font-weight: 700;
            color: var(--primary-red);
            margin-top: 6px;
            font-size: 1.1rem;
            word-break: break-all;
            text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 2px 2px 5px rgba(232, 67, 147, 0.3);
        }

        /* Bingo Messages */
        #bingo-msg {
            display: none;
            margin: 25px 0;
            background: white;
            padding: 25px;
            border-radius: 35px;
            border: 3px solid #ff74a4;
            box-shadow: 0 15px 30px rgba(255, 116, 164, 0.2);
            width: 90%;
            max-width: 400px;
            animation: bingoPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bingo-text {
            font-size: 2.5rem;
            font-family: var(--font-deco);
            color: var(--primary-red);
            margin: 0;
        }
        .bingo-subtext { font-size: 0.95rem; color: #444; margin: 12px 0; font-weight: bold; }
        .bingo-next-hint { font-size: 0.85rem; color: #ff74a4; font-weight: bold; animation: pulse 1.5s infinite; }
        .bingo-time { font-size: 0.8rem; color: var(--soft-gold); margin-top: 10px; display: block; }

        @keyframes pulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
        @keyframes bingoPop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* Actions */
        .footer-actions { margin-top: auto; padding: 40px 0; }
        .btn-reset-trigger { 
            background: white; border: 2px solid #ffecf2; color: #ffb3c6; 
            padding: 10px 25px; border-radius: 40px; font-size: 0.75rem; 
            cursor: pointer; font-weight: bold; transition: all 0.3s;
        }

        /* Modals */
        .modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 240, 240, 0.8); backdrop-filter: blur(8px); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 35px; border-radius: 40px; width: 85%; max-width: 350px; border: 4px solid #ffecf2; text-align: center; position: relative; }
        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #ffecf2; background: #fffafa; border-radius: 20px; font-size: 1.1rem; margin: 20px 0; box-sizing: border-box; text-align: center; outline: none; font-family: inherit; }
        .btn-main { background: linear-gradient(to right, #ff74a4, #ffb3c6); color: white; border: none; padding: 16px; border-radius: 20px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; box-shadow: 0 5px 15px rgba(255, 116, 164, 0.3); }

        #admin-panel { display: none; position: fixed; inset: 0; background: white; z-index: 3000; padding: 30px; overflow-y: auto; font-family: sans-serif; text-align: left; }
    </style>
</head>
<body>

    <h1 id="main-title">Wedding Bingo</h1>
    <div class="subtitle">✨ Human Connection Game ✨</div>

    <div class="rules-container">
        <span class="rules-title">🎀 ルール 🎀</span>
        <div class="rules-content">
            <ul>
                <li>制限時間内に、たくさんビンゴを目指そう！</li>
                <li><strong>同じテーブルではない人</strong>に名前を書いてもらってね。</li>
                <li>たくさん早くビンゴした人にプレゼントがあるかも🎁</li>
            </ul>
        </div>
    </div>

    <div class="grid" id="bingo-board"></div>

    <div id="bingo-msg">
        <p class="bingo-text" id="bingo-count-text">🎉 1 BINGO! 🎉</p>
        <span class="bingo-time" id="display-time"></span>
    </div>

    <div class="footer-actions">
        <button class="btn-reset-trigger" id="show-reset-confirm">やりなおす (Reset)</button>
    </div>

    <!-- Modals -->
    <div id="name-modal" class="modal">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="modal-title" style="margin-top:0; color:var(--primary-pink)">おなまえ入力</h3>
            <input type="text" id="name-input" placeholder="ここに入力..." maxlength="12">
            <button class="btn-main" id="submit-name">決定！</button>
            <button class="btn-reset-trigger" id="close-name-modal" style="border:none; margin-top:10px;">とじる</button>
        </div>
    </div>

    <div id="confirm-modal" class="modal">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="color: var(--primary-red); margin-top:0">リセットする？</h2>
            <p style="color:#888; font-size:0.9rem;">最初からやりなおしますか？</p>
            <button class="btn-main" id="execute-reset" style="margin-bottom: 10px;">リセットする</button>
            <button class="btn-reset-trigger" id="close-confirm-modal" style="border:none">やめる</button>
        </div>
    </div>

    <div id="admin-panel">
        <h2>Panel Settings</h2>
        <div id="admin-form"></div>
        <button class="btn-main" id="admin-save" style="margin-top:20px;">保存して閉じる</button>
    </div>

    <script>
        "use strict";

        // --- Configuration ---
    const DEFAULT_LABELS = [
        '血液型が自分と同じ人', 
        '自分と同じ趣味の人', 
        '今日お役目がある人(受付等)', // 少し短く、対象をぼかして探しやすく
        '子育て奮闘中のパパ・ママ', 
        '自分と同じ誕生月の人', 
        '新幹線や飛行機で来た人', 
        '同じ色のアイテムの人', // 「ドレスやネクタイ」などは入力時の説明に任せて短縮
        '同じ飲み物を飲んでる人'   // 「飲み物」にするとお酒以外も含むので親切
    ];
        const WIN_PATTERNS = [
            [0,1,2], [3,4,5], [6,7,8], // 横
            [0,3,6], [1,4,7], [2,5,8], // 縦
            [0,4,8], [2,4,6]           // 斜め
        ];

        const state = {
            names: [],
            labels: [],
            currentIdx: null,
            clickCount: 0,
            clickTimer: null
        };

        // --- Logic ---
        function loadData() {
            try {
                state.labels = JSON.parse(localStorage.getItem('bingoLabels')) || [...DEFAULT_LABELS];
                state.names = JSON.parse(localStorage.getItem('bingoNames')) || Array(9).fill('');
                if (!state.names[4]) state.names[4] = '主役の2人';
            } catch (e) {
                console.error("Data load error", e);
                state.labels = [...DEFAULT_LABELS];
                state.names = Array(9).fill('');
                state.names[4] = '主役の2人';
            }
        }

        function saveData() {
            localStorage.setItem('bingoLabels', JSON.stringify(state.labels));
            localStorage.setItem('bingoNames', JSON.stringify(state.names));
        }

        function renderBoard() {
            const board = document.getElementById('bingo-board');
            board.innerHTML = '';
            
            state.names.forEach((name, i) => {
                const cell = document.createElement('div');
                cell.className = 'cell' + (name ? ' active' : '');
                
                if (i === 4) {
                    cell.id = 'free-cell';
                    cell.innerHTML = `FREE<div class="name-display">${name}</div>`;
                } else {
                    const labelIdx = i < 4 ? i : i - 1;
                    const label = state.labels[labelIdx];
                    cell.innerHTML = `<div>${label}</div><div class="name-display">${name}</div>`;
                    cell.addEventListener('click', () => openModal(i, label));
                }
                board.appendChild(cell);
            });
            checkBingo();
        }

        function checkBingo() {
            const active = state.names.map(n => !!n);
            const bingoLines = WIN_PATTERNS.filter(p => p.every(idx => active[idx]));
            const count = bingoLines.length;
            
            const msgArea = document.getElementById('bingo-msg');
            const timeArea = document.getElementById('display-time');

            if (count > 0) {
                document.getElementById('bingo-count-text').innerText = `🎉 ${count} BINGO! 🎉`;
                if (!timeArea.innerText) {
                    timeArea.innerText = `達成時刻: ${new Date().toLocaleTimeString('ja-JP')}`;
                }
                msgArea.style.display = 'block';
            } else {
                msgArea.style.display = 'none';
                timeArea.innerText = '';
            }
        }

        // --- UI Interactions ---
        function openModal(idx, label) {
            state.currentIdx = idx;
            document.getElementById('modal-title').innerText = label;
            const input = document.getElementById('name-input');
            input.value = state.names[idx];
            document.getElementById('name-modal').style.display = 'flex';
            setTimeout(() => input.focus(), 100);
        }

        function closeModals() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            state.currentIdx = null;
        }

        function saveName() {
            const val = document.getElementById('name-input').value.trim();
            if (state.currentIdx !== null) {
                state.names[state.currentIdx] = val;
                // 名前が変わったら時刻を更新させるためにクリア
                document.getElementById('display-time').innerText = ''; 
                saveData();
                renderBoard();
                closeModals();
            }
        }

        async function handleReset() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((c, i) => setTimeout(() => c.classList.add('resetting'), i * 40));
            
            await new Promise(r => setTimeout(r, 600));
            state.names = Array(9).fill('');
            state.names[4] = '主役の2人';
            document.getElementById('display-time').innerText = '';
            saveData();
            renderBoard();
            closeModals();
        }

        function openAdmin() {
            const form = document.getElementById('admin-form');
            form.innerHTML = state.labels.map((l, i) => `
                <div style="margin-bottom:12px;">
                    <label style="font-size:12px;color:#999">マス ${i+1}</label><br>
                    <input type="text" value="${l}" class="admin-edit-input" style="width:100%;padding:8px;box-sizing:border-box">
                </div>
            `).join('');
            document.getElementById('admin-panel').style.display = 'block';
        }

        function saveAdmin() {
            const inputs = document.querySelectorAll('.admin-edit-input');
            state.labels = Array.from(inputs).map(i => i.value.trim() || '???');
            saveData();
            document.getElementById('admin-panel').style.display = 'none';
            renderBoard();
        }

        // --- Events ---
        function initEvents() {
            // Title Click (Admin)
            document.getElementById('main-title').addEventListener('click', () => {
                state.clickCount++;
                clearTimeout(state.clickTimer);
                if (state.clickCount >= 3) {
                    openAdmin();
                    state.clickCount = 0;
                } else {
                    state.clickTimer = setTimeout(() => { state.clickCount = 0; }, 500);
                }
            });

            // Modal Clicks
            document.querySelectorAll('.modal').forEach(m => {
                m.addEventListener('click', closeModals);
            });
            document.getElementById('submit-name').addEventListener('click', saveName);
            document.getElementById('close-name-modal').addEventListener('click', closeModals);
            document.getElementById('close-confirm-modal').addEventListener('click', closeModals);
            document.getElementById('admin-save').addEventListener('click', saveAdmin);
            
            // Reset Trigger
            document.getElementById('show-reset-confirm').addEventListener('click', () => {
                document.getElementById('confirm-modal').style.display = 'flex';
            });
            document.getElementById('execute-reset').addEventListener('click', handleReset);

            // Keyboard
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeModals();
                if (e.key === 'Enter' && document.getElementById('name-modal').style.display === 'flex') saveName();
            });
        }

        // --- Start ---
        window.addEventListener('DOMContentLoaded', () => {
            loadData();
            initEvents();
            renderBoard();
        });
    </script>
</body>
</html>
